name: Update Rollback Snapshot

on:
  push:
    branches: [main]
    paths-ignore:
      - 'ROLLBACK.md'      # prevent infinite loop
      - 'CODEBASE_MAP.md'
      - 'README.md'

jobs:
  snapshot:
    name: Create rollback branch + update ROLLBACK.md
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect metadata
        id: meta
        run: |
          SHA=$(git log -1 --format='%H' HEAD)
          SHA_SHORT=$(git log -1 --format='%h' HEAD)
          DATE=$(git log -1 --format='%Y-%m-%d' HEAD)
          SUBJECT=$(git log -1 --format='%s' HEAD)
          # Derive slug: lowercase, replace non-alphanumeric with dash, collapse dashes, trim to 40 chars
          SLUG=$(echo "$SUBJECT" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40 | sed 's/-$//')
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT
          # Use printf to safely handle special characters in subject
          printf 'subject=%s\n' "$SUBJECT" >> $GITHUB_OUTPUT
          echo "slug=${SLUG}" >> $GITHUB_OUTPUT
          echo "branch_name=rollback/${SLUG}-${DATE}" >> $GITHUB_OUTPUT

      - name: Create rollback branch
        env:
          SHA: ${{ steps.meta.outputs.sha }}
          BRANCH_NAME: ${{ steps.meta.outputs.branch_name }}
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # ls-remote exits 2 when branch missing — use || true so step never fails
          EXISTS=$(git ls-remote --heads origin "${BRANCH_NAME}" | wc -l | tr -d ' ')
          if [ "$EXISTS" -gt "0" ]; then
            echo "Branch ${BRANCH_NAME} already exists — skipping"
          else
            git branch "${BRANCH_NAME}" "${SHA}"
            git push origin "${BRANCH_NAME}"
            echo "Created rollback branch: ${BRANCH_NAME} @ ${SHA}"
          fi

      - name: Update ROLLBACK.md
        env:
          SHA: ${{ steps.meta.outputs.sha }}
          SHA_SHORT: ${{ steps.meta.outputs.sha_short }}
          DATE: ${{ steps.meta.outputs.date }}
          SUBJECT: ${{ steps.meta.outputs.subject }}
          BRANCH_NAME: ${{ steps.meta.outputs.branch_name }}
        run: python3 .github/scripts/gen_rollback_entry.py

      - name: Commit updated ROLLBACK.md
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin main
          git add ROLLBACK.md
          if git diff --cached --quiet; then
            echo 'No changes to ROLLBACK.md — skipping commit'
          else
            git commit -m 'docs(auto): update ROLLBACK.md snapshot log [skip ci]'
            git push
          fi
