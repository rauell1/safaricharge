name: Update Rollback Snapshot

on:
  push:
    branches: [main]
    paths-ignore:
      - 'ROLLBACK.md'
      - 'CODEBASE_MAP.md'
      - 'README.md'

jobs:
  snapshot:
    name: Create rollback branch + update ROLLBACK.md
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Collect metadata
        id: meta
        run: |
          SHA=$(git log -1 --no-decorate --format='%H' HEAD)
          SHA_SHORT=$(git log -1 --no-decorate --format='%h' HEAD)
          DATE=$(git log -1 --no-decorate --date=short --format='%ad' HEAD)
          SUBJECT=$(git log -1 --no-decorate --format='%s' HEAD)
          SLUG=$(echo "$SUBJECT" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/--*/-/g' \
            | cut -c1-38 \
            | sed 's/-$//')
          BRANCH_NAME="rollback/${SLUG}-${DATE}"
          echo "sha=${SHA}"                 >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}"     >> $GITHUB_OUTPUT
          echo "date=${DATE}"               >> $GITHUB_OUTPUT
          printf 'subject=%s\n' "$SUBJECT"  >> $GITHUB_OUTPUT
          echo "slug=${SLUG}"               >> $GITHUB_OUTPUT
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "DEBUG slug:        ${SLUG}"
          echo "DEBUG date:        ${DATE}"
          echo "DEBUG branch_name: ${BRANCH_NAME}"

      - name: Create rollback branch
        env:
          SHA: ${{ steps.meta.outputs.sha }}
          BRANCH_NAME: ${{ steps.meta.outputs.branch_name }}
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          EXISTS=$(git ls-remote --heads origin "${BRANCH_NAME}" | wc -l | tr -d ' ')
          if [ "$EXISTS" -gt "0" ]; then
            echo "Branch ${BRANCH_NAME} already exists — skipping"
          else
            git branch "${BRANCH_NAME}" "${SHA}"
            git push origin "${BRANCH_NAME}"
            echo "Created rollback branch: ${BRANCH_NAME} @ ${SHA}"
          fi

      - name: Commit and push ROLLBACK.md
        env:
          SHA: ${{ steps.meta.outputs.sha }}
          SHA_SHORT: ${{ steps.meta.outputs.sha_short }}
          DATE: ${{ steps.meta.outputs.date }}
          SUBJECT: ${{ steps.meta.outputs.subject }}
          BRANCH_NAME: ${{ steps.meta.outputs.branch_name }}
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          for i in 1 2 3 4 5; do
            echo "=== Attempt ${i} ==="

            # Pull latest main first so the script runs against current ROLLBACK.md
            git pull --rebase origin main

            # Re-run the script on every attempt — it is idempotent (skips if branch already recorded)
            python3 .github/scripts/gen_rollback_entry.py

            git add ROLLBACK.md
            if git diff --cached --quiet; then
              echo 'No changes to ROLLBACK.md — already recorded, skipping'
              exit 0
            fi

            # Amend or create commit
            git diff HEAD -- ROLLBACK.md | grep -q '.' \
              && git commit -m 'docs(auto): update ROLLBACK.md snapshot log [skip ci]' \
              || git commit --allow-empty -m 'docs(auto): update ROLLBACK.md snapshot log [skip ci]'

            git push origin main && exit 0

            # Push rejected — undo local commit and retry
            git reset HEAD~1
            echo "Push rejected — retrying in 3s"
            sleep 3
          done

          echo 'All push attempts failed' && exit 1
