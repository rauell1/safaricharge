name: Update README

on:
  push:
    branches: ['**']
    paths-ignore:
      - 'README.md'
      - 'CODEBASE_MAP.md'
      - 'ROLLBACK.md'
      - '.github/**'
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

# One run at a time per branch; cancel any queued duplicate.
concurrency:
  group: update-readme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-readme:
    name: Regenerate README.md
    if: github.ref_name == 'main' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      DEFAULT_BRANCH: main
      REPO: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Collect metadata
        id: meta
        run: |
          echo "last_commit=$(git log -1 --no-decorate --format='%H' HEAD)"              >> $GITHUB_OUTPUT
          echo "last_commit_short=$(git log -1 --no-decorate --format='%h' HEAD)"        >> $GITHUB_OUTPUT
          echo "last_author=$(git log -1 --no-decorate --format='%an' HEAD)"             >> $GITHUB_OUTPUT
          echo "last_date=$(git log -1 --no-decorate --date=short --format='%ad' HEAD)"  >> $GITHUB_OUTPUT
          printf 'last_message=%s\n' "$(git log -1 --no-decorate --format='%s' HEAD)"   >> $GITHUB_OUTPUT
          echo "total_commits=$(git rev-list --count HEAD)"                              >> $GITHUB_OUTPUT
          echo "total_ts=$(find src -name '*.ts' -o -name '*.tsx' 2>/dev/null | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Regenerate README.md
        env:
          LAST_COMMIT:       ${{ steps.meta.outputs.last_commit }}
          LAST_COMMIT_SHORT: ${{ steps.meta.outputs.last_commit_short }}
          LAST_AUTHOR:       ${{ steps.meta.outputs.last_author }}
          LAST_DATE:         ${{ steps.meta.outputs.last_date }}
          LAST_MESSAGE:      ${{ steps.meta.outputs.last_message }}
          TOTAL_COMMITS:     ${{ steps.meta.outputs.total_commits }}
          TOTAL_TS:          ${{ steps.meta.outputs.total_ts }}
        run: python3 .github/scripts/gen_readme.py

      - name: Commit and push README.md
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          if git diff --cached --quiet; then
            echo 'No changes — skipping'
            exit 0
          fi
          for i in 1 2 3 4 5; do
            echo "Push attempt ${i}"
            git fetch origin "$DEFAULT_BRANCH"
            git reset --hard "origin/$DEFAULT_BRANCH"
            python3 .github/scripts/gen_readme.py
            git add README.md
            if git diff --cached --quiet; then
              echo 'No changes after sync — skipping'
              exit 0
            fi
            git commit -m 'docs(auto): regenerate README.md [skip ci]'
            git push origin "$DEFAULT_BRANCH" && exit 0
            echo "Push rejected — retrying in 3s"
            sleep 3
          done
          echo 'All push attempts failed; skipping hard failure to keep automation non-blocking'
          exit 0
