name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR so stale jobs don't waste
# runner minutes when you push multiple commits quickly.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Type-check (tsc --noEmit)
  # ─────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tsc
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Lint (ESLint via next lint)
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Build (next build)
  # Only runs after typecheck + lint both pass.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Next.js build
        run: npx next build
        env:
          # Treat warnings as non-fatal during CI builds so ESLint
          # warnings in dependencies don't fail the build step.
          NEXT_TELEMETRY_DISABLED: '1'
