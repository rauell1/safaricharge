name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    # Lint is informational — it never blocks build or deploy.
    # Remove this line when the codebase is lint-clean and you want to enforce.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - run: npx eslint . --max-warnings=9999

  build:
    name: Build
    runs-on: ubuntu-latest
    # Lint removed from needs — build gates only on type correctness.
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - name: Next.js build
        run: npx next build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          DATABASE_URL: 'postgresql://user:pass@localhost:5432/safaricharge'

  # ───────────────────────────────────────────────────────────────────────────
  # Deploy — only on pushes to main (not PRs), after build succeeds.
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/safaricharge
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build --pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              run --rm app npx prisma migrate deploy
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --remove-orphans
            docker image prune -f
            echo "✅ Deployed $(git rev-parse --short HEAD)"
