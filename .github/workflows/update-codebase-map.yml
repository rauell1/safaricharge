name: Update Codebase Map

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CODEBASE_MAP.md'  # prevent infinite loop

jobs:
  update-map:
    name: Regenerate CODEBASE_MAP.md
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tree
        run: sudo apt-get install -y tree > /dev/null 2>&1

      - name: Collect metadata
        id: meta
        run: |
          echo "total_ts=$(find src -name '*.ts' -o -name '*.tsx' | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "total_py=$(find . -name '*.py' ! -path '*/node_modules/*' | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "last_commit=$(git log -1 --format='%H' main)" >> $GITHUB_OUTPUT
          echo "last_author=$(git log -1 --format='%an' main)" >> $GITHUB_OUTPUT
          echo "last_date=$(git log -1 --format='%ci' main)" >> $GITHUB_OUTPUT
          echo "branch=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT

      - name: Rebuild CODEBASE_MAP.md
        env:
          TOTAL_TS: ${{ steps.meta.outputs.total_ts }}
          TOTAL_PY: ${{ steps.meta.outputs.total_py }}
          LAST_COMMIT: ${{ steps.meta.outputs.last_commit }}
          LAST_AUTHOR: ${{ steps.meta.outputs.last_author }}
          LAST_DATE: ${{ steps.meta.outputs.last_date }}
          BRANCH: ${{ steps.meta.outputs.branch }}
        run: python3 .github/scripts/gen_codebase_map.py

      - name: Commit updated map
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add CODEBASE_MAP.md
          if git diff --cached --quiet; then
            echo 'No changes to CODEBASE_MAP.md — skipping commit'
          else
            git commit -m 'docs(auto): regenerate CODEBASE_MAP.md [skip ci]'
            git push
          fi
