name: Deploy to VPS

on:
  push:
    branches: [main]

# Only one deploy at a time; cancel stale runs.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    # Gate: only deploy after typecheck + lint + build pass in ci.yml.
    # ci.yml and deploy.yml are separate workflow files but share the same
    # commit SHA, so `workflow_run` would be the clean approach.
    # For now we duplicate the build step here as the gate, since GitHub
    # Actions cannot `needs` across workflow files.
    needs: []
    environment: production
    # Only run when CI workflow has succeeded on this commit.
    # The deploy job in ci.yml already handles the post-build deploy;
    # this file is kept as the canonical SSH deploy definition but is
    # triggered only when called from ci.yml via workflow_run.
    if: ${{ false }}  # Disabled — deploy is handled by the deploy job in ci.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/safaricharge

            git fetch origin main
            git reset --hard origin/main

            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              pull --ignore-pull-failures || true
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              build --pull

            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              run --rm app npx prisma migrate deploy

            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --remove-orphans

            docker image prune -f

            echo "✅ Deploy complete"
