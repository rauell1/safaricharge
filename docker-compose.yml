# SafariCharge – full local + production stack
# Usage:
#   dev:   docker compose up
#   prod:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-safaricharge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-safaricharge_dev}
      POSTGRES_DB: ${POSTGRES_DB:-safaricharge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-safaricharge}"] 
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"  # expose for local tooling; remove in prod overlay

  # ── Next.js app ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-safaricharge}:${POSTGRES_PASSWORD:-safaricharge_dev}@db:5432/${POSTGRES_DB:-safaricharge}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      API_SERVICE_TOKEN: ${API_SERVICE_TOKEN:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    volumes:
      # Persist SQLite fallback if DATABASE_URL is still file-based in dev
      - app_data:/app/prisma

  # ── Python forecasting micro-service ─────────────────────────────────────────
  forecasting:
    build:
      context: ./forecasting
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"

  # ── IoT bridge (MQTT / Modbus) ────────────────────────────────────────────────
  iot-bridge:
    build:
      context: ./iot-bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - app
    environment:
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-mqtt://localhost:1883}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-safaricharge/}
      MODBUS_HOST: ${MODBUS_HOST:-}
      MODBUS_PORT: ${MODBUS_PORT:-502}
      SC_INGEST_URL: http://app:3000/api/ingest
      SC_INGEST_TOKEN: ${API_SERVICE_TOKEN:-}
    ports:
      - "4000:4000"

  # ── Caddy reverse proxy ──────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  app_data:
  caddy_data:
  caddy_config:
