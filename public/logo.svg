<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" role="img" aria-label="SafariCharge logo">
  <defs>
    <radialGradient id="bg" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#0c8a92"/>
      <stop offset="100%" stop-color="#014f54"/>
    </radialGradient>
    <style>
      .mark { animation: breathe 2.8s ease-in-out infinite; }
      @keyframes breathe {
        0%,100% { opacity:.85; }
        50%      { opacity:1;  }
      }
      @media (prefers-reduced-motion:reduce) {
        .mark { animation:none; opacity:1; }
      }
    </style>
  </defs>

  <!-- Rounded square background -->
  <rect width="40" height="40" rx="9" fill="url(#bg)"/>

  <!-- Z / lightning-bolt mark (3 pieces) -->
  <g class="mark" fill="white">
    <!-- Top horizontal bar -->
    <path d="M9 9 H24.5 L21.8 13 H9 Z"/>
    <!-- Diagonal slash -->
    <path d="M21.8 13 L15.5 27 H13 L19.3 13 Z"/>
    <!-- Bottom horizontal bar -->
    <path d="M15.5 27 L31 27 V31 H18.2 Z"/>
  </g>
</svg>
